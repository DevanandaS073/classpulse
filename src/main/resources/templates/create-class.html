<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Class – ClassPulse</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="navbar-brand">Class<span>Pulse</span></div>
        <div class="nav-actions">
            <a th:href="@{/dashboard}" class="btn btn-secondary btn-sm">← Dashboard</a>
            <form th:action="@{/logout}" method="post" style="display:inline;">
                <button type="submit" class="btn btn-secondary btn-sm">Sign Out</button>
            </form>
        </div>
    </nav>

    <div class="container page-content">
        <div style="max-width: 560px; margin: 0 auto;">

            <div class="page-header">
                <div class="page-header-title">
                    <div class="breadcrumb">
                        <a th:href="@{/dashboard}">Dashboard</a>
                        <span class="sep">›</span>
                        <span>Create Class</span>
                    </div>
                    <h2>Create New Class</h2>
                    <p>Set up a class with subject and academic year</p>
                </div>
            </div>

            <div class="card">
                <div class="card-body">

                    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                    <form th:action="@{/classes/create}" method="post" th:object="${schoolClass}">

                        <div class="form-group">
                            <label class="form-label" for="name">Class Name</label>
                            <input id="name" type="text" th:field="*{name}" class="form-control"
                                placeholder="e.g. +1 A, +2 B" required autofocus />
                            <small th:if="${#fields.hasErrors('name')}" th:errors="*{name}"
                                style="color:var(--danger);font-size:0.8rem;"></small>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="academicYear">Academic Year</label>
                            <select id="academicYear" name="academicYear" class="form-control" required
                                onchange="updateSubjects(this)">
                                <option value="">-- Select Academic Year --</option>
                                <option th:each="year : ${academicYears}" th:value="${year}"
                                    th:text="${year == T(com.classpulse.model.AcademicYear).FIRST_YEAR ? 'First Year' : 'Second Year'}">
                                </option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="subject">Subject</label>
                            <select id="subject" name="subject" class="form-control" required>
                                <option value="">-- Select Academic Year first --</option>
                            </select>
                            <small th:if="${#fields.hasErrors('subject')}" th:errors="*{subject}"
                                style="color:var(--danger);font-size:0.8rem;"></small>
                        </div>

                        <div style="display:flex; gap:0.75rem; margin-top:1.5rem;">
                            <button type="submit" class="btn btn-primary btn-lg">Create Class</button>
                            <a th:href="@{/dashboard}" class="btn btn-secondary btn-lg">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script th:inline="javascript">
        const firstYearSubjects = /*[[${firstYearSubjects}]]*/[];
        const secondYearSubjects = /*[[${secondYearSubjects}]]*/[];

        function updateSubjects(select) {
            const subjectSelect = document.getElementById('subject');
            const year = select.value;
            let subjects = [];
            if (year === 'FIRST_YEAR') subjects = firstYearSubjects;
            else if (year === 'SECOND_YEAR') subjects = secondYearSubjects;

            subjectSelect.innerHTML = '<option value="">-- Select Subject --</option>';
            subjects.forEach(s => {
                const opt = document.createElement('option');
                opt.value = s;
                opt.textContent = s;
                subjectSelect.appendChild(opt);
            });
        }
    </script>
</body>

</html>
