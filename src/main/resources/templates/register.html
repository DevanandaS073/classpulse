<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register – ClassPulse</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>

<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-logo">
                <h1>ClassPulse</h1>
                <p>Teacher Performance Dashboard</p>
            </div>

            <h2 class="auth-title">Create account</h2>
            <p class="auth-subtitle">Register as a teacher to get started</p>

            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
            <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

            <form th:action="@{/register}" method="post" th:object="${teacher}">
                <div class="form-group">
                    <label class="form-label" for="name">Full Name</label>
                    <input id="name" type="text" th:field="*{name}" class="form-control" placeholder="e.g. Priya Nair"
                        required autofocus />
                    <small th:if="${#fields.hasErrors('name')}" th:errors="*{name}"
                        style="color:var(--danger);font-size:0.8rem;"></small>
                </div>
                <div class="form-group">
                    <label class="form-label" for="email">Email Address</label>
                    <input id="email" type="email" th:field="*{email}" class="form-control"
                        placeholder="teacher@school.edu" required />
                    <small th:if="${#fields.hasErrors('email')}" th:errors="*{email}"
                        style="color:var(--danger);font-size:0.8rem;"></small>
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input id="password" type="password" th:field="*{password}" class="form-control"
                        placeholder="Create a strong password" required />
                    <small th:if="${#fields.hasErrors('password')}" th:errors="*{password}"
                        style="color:var(--danger);font-size:0.8rem;"></small>
                </div>
                <button type="submit" class="btn btn-primary btn-full btn-lg" style="margin-top:0.5rem;">
                    Create Account →
                </button>
            </form>

            <p style="text-align:center; margin-top: 1.5rem; font-size: 0.9rem; color: var(--text-muted);">
                Already registered?
                <a th:href="@{/login}" style="color: var(--primary-light); font-weight: 600;">Sign in</a>
            </p>
        </div>
    </div>
</body>

</html>
